<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="48" height="48">
  <rect width="32" height="32" rx="7" fill="#18181b"/>
  <!-- Ears (drawn before head so head overlaps inner portions) -->
  <circle cx="4.5" cy="12" r="5" fill="#78350f"/>
  <circle cx="4.5" cy="12" r="3" fill="#b45309"/>
  <circle cx="27.5" cy="12" r="5" fill="#78350f"/>
  <circle cx="27.5" cy="12" r="3" fill="#b45309"/>
  <!-- Head -->
  <circle cx="16" cy="16" r="11" fill="#78350f"/>
  <!-- Muzzle -->
  <ellipse cx="16" cy="20.5" rx="5.5" ry="4" fill="#b45309"/>
  <!-- Eyes -->
  <circle cx="12.5" cy="14" r="2.3" fill="white"/>
  <circle cx="19.5" cy="14" r="2.3" fill="white"/>
  <!-- Pupils -->
  <circle cx="13" cy="14.5" r="1.4" fill="#18181b"/>
  <circle cx="20" cy="14.5" r="1.4" fill="#18181b"/>
  <!-- Nostrils -->
  <circle cx="14.5" cy="19" r="0.8" fill="#5c2205"/>
  <circle cx="17.5" cy="19" r="0.8" fill="#5c2205"/>
</svg>
