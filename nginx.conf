server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Never cache index.html so browsers always get fresh asset references
    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Hashed assets (JS/CSS) can be cached indefinitely
    location /assets/ {
        expires max;
        add_header Cache-Control "public, immutable";
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy only the specific TT-RSS paths needed by ttrss-react.
    # Configure the API URL in the app as: http://<host>:<FRONTEND_PORT>/tt-rss/api/
    location /tt-rss/api/ {
        proxy_pass http://web-nginx/tt-rss/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Feed icons
    location /tt-rss/public.php {
        proxy_pass http://web-nginx/tt-rss/public.php;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
