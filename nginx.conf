server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Never cache index.html so browsers always get fresh asset references
    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Hashed assets (JS/CSS) can be cached indefinitely
    location /assets/ {
        expires max;
        add_header Cache-Control "public, immutable";
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all TT-RSS paths so the session cookie is shared with Rhesus.
    # This means opening TT-RSS settings from within Rhesus uses the same
    # logged-in user without requiring a separate login.
    location /tt-rss/ {
        proxy_pass http://web-nginx/tt-rss/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Firefox plugin
    location /rhesus-share.xpi {
        alias /usr/share/nginx/html/rhesus-share.xpi;
        types { application/x-xpinstall xpi; }
    }
}
