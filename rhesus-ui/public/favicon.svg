<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#18181b"/>
  <!-- Ears (single tone, drawn before head so head overlaps inner portions) -->
  <circle cx="4.5" cy="12" r="5" fill="#d97706"/>
  <circle cx="27.5" cy="12" r="5" fill="#d97706"/>
  <!-- Head -->
  <circle cx="16" cy="16" r="11" fill="#d97706"/>
  <!-- Muzzle -->
  <ellipse cx="16" cy="20.5" rx="5.5" ry="4" fill="#fbbf24"/>
  <!-- Eyes (flat dots, no separate pupil/sclera - vanishes at favicon size) -->
  <circle cx="12.5" cy="14" r="1.8" fill="#18181b"/>
  <circle cx="19.5" cy="14" r="1.8" fill="#18181b"/>
</svg>
